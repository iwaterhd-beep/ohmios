<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>Página no encontrada | OHMIOS Energía</title>
  <link rel="icon" type="image/png" href="assets/images/logo-ohmios.png">
  <link rel="apple-touch-icon" href="assets/images/logo-ohmios.png">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/about.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .error-page {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-top: var(--header-height);
    }
    .error-page__code {
      font-family: var(--font-heading);
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 700;
      line-height: 1;
      background: var(--gradient-electric);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: var(--space-md);
    }
    .error-page__title { margin-bottom: var(--space-md); }
    .error-page__text {
      color: var(--color-gray-500);
      margin-bottom: var(--space-xl);
      margin-inline: auto;
    }
    .error-page__actions {
      display: flex;
      gap: var(--space-md);
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Saltar al contenido principal</a>
  <div id="header-placeholder"></div>
  <main id="main-content" class="error-page">
    <div class="container">
      <p class="error-page__code" aria-hidden="true">404</p>
      <h1 class="error-page__title">Página no encontrada</h1>
      <p class="error-page__text">La página que buscas no existe o ha sido movida.</p>
      <div class="error-page__actions">
        <a href="index.html" class="btn btn--primary">Volver al inicio</a>
        <a href="contacto.html" class="btn btn--secondary">Contactar</a>
      </div>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="js/main.js" type="module"></script>
</body>
</html>
