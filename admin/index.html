<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Panel CMS | OHMIOS Energía</title>
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Login -->
  <div class="admin-login" id="loginScreen">
    <div class="admin-login__card">
      <div class="admin-login__brand">
        <svg viewBox="0 0 40 40" width="40" height="40" fill="none"><rect width="40" height="40" rx="8" fill="url(#lg)"/><path d="M12 28V12h4.5l3.5 9.5L23.5 12H28v16h-3.5V18.5L21 28h-2L15.5 18.5V28H12z" fill="#0B0B0B"/><defs><linearGradient id="lg" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#00AEEF"/><stop offset="1" stop-color="#00D084"/></linearGradient></defs></svg>
        <h1>Panel OHMIOS</h1>
        <p>Gestiona textos, imágenes y proyectos</p>
      </div>
      <form id="loginForm">
        <label class="admin-label" for="email">Email</label>
        <input class="admin-input" type="email" id="email" value="ohmios@admin.com" placeholder="ohmios@admin.com" required autocomplete="username">
        <label class="admin-label" for="password">Contraseña</label>
        <input class="admin-input" type="password" id="password" placeholder="Introduce tu contraseña" required autocomplete="current-password">
        <p class="admin-error" id="loginError" hidden></p>
        <button type="submit" class="admin-btn admin-btn--primary">Entrar al panel</button>
      </form>
      <p class="admin-login__hint">Los cambios se publican automáticamente en la web en ~1 minuto.</p>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="admin-app" id="adminApp" hidden>
    <aside class="admin-sidebar">
      <div class="admin-sidebar__brand">
        <span>OHMIOS</span>
        <small>Panel CMS</small>
      </div>
      <nav class="admin-nav" id="adminNav">
        <button type="button" class="admin-nav__item is-active" data-tab="settings">General</button>
        <button type="button" class="admin-nav__item" data-tab="home">Inicio</button>
        <button type="button" class="admin-nav__item" data-tab="services">Servicios</button>
        <button type="button" class="admin-nav__item" data-tab="projects">Proyectos</button>
      </nav>
      <div class="admin-sidebar__footer">
        <a href="../index.html" class="admin-link" target="_blank">Ver web →</a>
        <button type="button" class="admin-link admin-link--muted" id="logoutBtn">Cerrar sesión</button>
      </div>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h2 id="panelTitle">Configuración general</h2>
        <button type="button" class="admin-btn admin-btn--primary" id="saveBtn">Guardar cambios</button>
      </header>

      <div class="admin-status" id="adminStatus" role="status" hidden></div>

      <!-- Tab: Settings -->
      <section class="admin-panel is-active" id="panel-settings" data-panel="settings"></section>

      <!-- Tab: Home -->
      <section class="admin-panel" id="panel-home" data-panel="home"></section>

      <!-- Tab: Services -->
      <section class="admin-panel" id="panel-services" data-panel="services"></section>

      <!-- Tab: Projects -->
      <section class="admin-panel" id="panel-projects" data-panel="projects"></section>
    </main>
  </div>

  <script src="js/admin.js" type="module"></script>
</body>
</html>
